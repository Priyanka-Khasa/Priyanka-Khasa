<svg width="900" height="190" viewBox="0 0 900 190" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Contribution Rhythm</title>
  <desc id="desc">A clean capped bar graph showing steady GitHub contribution rhythm.</desc>
  <defs>
    <linearGradient id="g" x1="0" y1="36" x2="0" y2="154" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2F81F7"/>
      <stop offset="1" stop-color="#238636"/>
    </linearGradient>
    <linearGradient id="hot" x1="0" y1="30" x2="0" y2="154" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F78166"/>
      <stop offset="1" stop-color="#2F81F7"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="900" height="190" rx="16" fill="#F6F8FA"/>
  <text x="34" y="42" fill="#24292F" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Contribution Rhythm</text>
  <text x="34" y="66" fill="#57606A" font-family="Segoe UI, Arial, sans-serif" font-size="13">Steady project work, commits, fixes, and README updates</text>

  <line x1="34" y1="154" x2="866" y2="154" stroke="#D8DEE4"/>
  <line x1="34" y1="106" x2="866" y2="106" stroke="#D8DEE4" stroke-dasharray="4 10" opacity="0.8"/>

  <rect x="76" y="126" width="34" height="28" rx="9" fill="url(#g)"/>
  <rect x="139" y="101" width="34" height="53" rx="9" fill="url(#g)"/>
  <rect x="202" y="76" width="34" height="78" rx="9" fill="url(#g)"/>
  <rect x="265" y="48" width="34" height="106" rx="9" fill="url(#hot)"/>
  <rect x="328" y="84" width="34" height="70" rx="9" fill="url(#g)"/>
  <rect x="391" y="154" width="34" height="0" rx="9" fill="url(#g)"/>
  <rect x="454" y="92" width="34" height="62" rx="9" fill="url(#g)"/>
  <rect x="517" y="56" width="34" height="98" rx="9" fill="url(#g)"/>
  <rect x="580" y="112" width="34" height="42" rx="9" fill="url(#g)"/>
  <rect x="643" y="76" width="34" height="78" rx="9" fill="url(#g)"/>
  <rect x="706" y="48" width="34" height="106" rx="9" fill="url(#hot)"/>
  <rect x="769" y="88" width="34" height="66" rx="9" fill="url(#g)"/>

  <text x="79" y="175" fill="#57606A" font-family="Segoe UI, Arial, sans-serif" font-size="12">3</text>
  <text x="142" y="175" fill="#57606A" font-family="Segoe UI, Arial, sans-serif" font-size="12">8</text>
  <text x="201" y="175" fill="#57606A" font-family="Segoe UI, Arial, sans-serif" font-size="12">12</text>
  <text x="262" y="175" fill="#57606A" font-family="Segoe UI, Arial, sans-serif" font-size="12">15+</text>
  <text x="327" y="175" fill="#57606A" font-family="Segoe UI, Arial, sans-serif" font-size="12">11</text>
  <text x="394" y="175" fill="#57606A" font-family="Segoe UI, Arial, sans-serif" font-size="12">0</text>
  <text x="457" y="175" fill="#57606A" font-family="Segoe UI, Arial, sans-serif" font-size="12">9</text>
  <text x="516" y="175" fill="#57606A" font-family="Segoe UI, Arial, sans-serif" font-size="12">14</text>
  <text x="583" y="175" fill="#57606A" font-family="Segoe UI, Arial, sans-serif" font-size="12">6</text>
  <text x="642" y="175" fill="#57606A" font-family="Segoe UI, Arial, sans-serif" font-size="12">12</text>
  <text x="703" y="175" fill="#57606A" font-family="Segoe UI, Arial, sans-serif" font-size="12">15+</text>
  <text x="768" y="175" fill="#57606A" font-family="Segoe UI, Arial, sans-serif" font-size="12">10</text>

  <text x="801" y="42" fill="#57606A" font-family="Segoe UI, Arial, sans-serif" font-size="12">cap 15/day</text>
</svg>
